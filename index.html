<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>

    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:black;
        }

        video{
            width:100%;
            height:100%;
            object-fit:cover;
        }
    </style>
</head>
<body>

<video id="video" autoplay muted playsinline preload="auto">
    <source src="vidd.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<script>
const video = document.querySelector("video");

// Unmute after playback starts (some browsers block autoplay with sound)
video.play().then(() => {
    video.muted = false;
}).catch(() => {
    console.log("Autoplay with sound was blocked by the browser.");
});
</script>

</body>
</html>
